  /reports/contracts:
    get:
      summary: 合同分析报表
      description: 获取合同分析统计数据
      parameters:
        - name: start_date
          in: query
          type: string
          format: date
          description: 统计开始日期
        - name: end_date
          in: query
          type: string
          format: date
          description: 统计结束日期
      responses:
        200:
          description: 成功
          schema:
            type: object
            properties:
              total_contracts:
                type: integer
                description: 合同总数
              total_amount:
                type: number
                description: 合同总金额
              month_amount:
                type: number
                description: 本月合同金额
              quarter_amount:
