          description: 成功
          schema:
            type: object
            properties:
              total_customers:
                type: integer
                description: 客户总数
              new_customers:
                type: integer
                description: 新增客户数
              industry_distribution:
                type: object
                description: 行业分布
              level_distribution:
                type: object
                description: 等级分布

  /reports/business:
